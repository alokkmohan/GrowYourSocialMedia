<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled — BoostKaro</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .cancel-card {
      max-width: 400px;
      margin: 80px auto;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 40px 32px;
      text-align: center;
    }
    .cancel-card h1 { font-size: 1.4rem; margin: 16px 0 8px; }
    .cancel-card p  { color: #888; margin-bottom: 24px; }
    .retry-btn {
      display: inline-block;
      background: #7c3aed;
      color: #fff;
      border-radius: 8px;
      padding: 12px 28px;
      text-decoration: none;
      font-weight: 700;
      margin-right: 8px;
    }
    .retry-btn:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">⚡ BoostKaro</a>
  </header>

  <div class="cancel-card">
    <div style="font-size:3.5rem">❌</div>
    <h1>Payment Cancel Hua</h1>
    <p>Koi baat nahi! Aap wapas ja kar dobara try kar sakte hain.</p>
    <a href="index.html" class="retry-btn">Dobara Try Karo</a>
  </div>
</body>
</html>
