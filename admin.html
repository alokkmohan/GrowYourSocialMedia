<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>BoostKaro Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f1f5f9;min-height:100vh;color:#1e293b}

    /* LOGIN */
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f97316 0%,#ec4899 100%)}
    .login-box{background:#fff;border-radius:20px;padding:40px 32px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
    .login-logo{font-size:2rem;font-weight:800;color:#f97316;margin-bottom:4px}
    .login-sub{color:#94a3b8;font-size:0.9rem;margin-bottom:28px}
    .login-box input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:1rem;margin-bottom:12px;outline:none;font-family:inherit}
    .login-box input:focus{border-color:#f97316}
    .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#f97316,#ec4899);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit}

    /* LAYOUT */
    .header{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50}
    .logo{font-size:1.1rem;font-weight:800;color:#f97316}
    .header-right{display:flex;align-items:center;gap:16px}
    .stats{display:flex;gap:20px}
    .stat{text-align:center}
    .stat strong{display:block;font-size:1rem;font-weight:800;color:#1e293b}
    .stat span{font-size:0.7rem;color:#94a3b8;font-weight:500}
    .btn-refresh{background:#f8fafc;border:1px solid #e2e8f0;color:#64748b;padding:7px 14px;border-radius:8px;font-weight:600;cursor:pointer;font-size:0.82rem;font-family:inherit}
    .btn-refresh:hover{border-color:#f97316;color:#f97316}

    /* TABS */
    .tabs-wrap{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;display:flex;gap:0}
    .tab{padding:14px 20px;font-size:0.88rem;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap}
    .tab:hover{color:#f97316}
    .tab.active{color:#f97316;border-bottom-color:#f97316}
    .tab .badge{display:inline-block;margin-left:6px;background:#f1f5f9;color:#64748b;border-radius:999px;padding:1px 7px;font-size:0.72rem;font-weight:700}
    .tab.active .badge{background:#fff0e8;color:#f97316}

    /* TABLE */
    .table-wrap{padding:20px 24px;overflow-x:auto}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
    thead tr{background:#f8fafc;border-bottom:1px solid #e2e8f0}
    th{padding:11px 14px;text-align:left;font-size:0.75rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}
    tbody tr{border-bottom:1px solid #f1f5f9;transition:background 0.1s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#fafafa}
    td{padding:12px 14px;font-size:0.875rem;vertical-align:middle}
    .sr{color:#94a3b8;font-size:0.8rem;font-weight:600}
    .order-id{font-family:monospace;font-size:0.78rem;color:#64748b;background:#f1f5f9;padding:2px 7px;border-radius:5px}
    .cust-name{font-weight:600;color:#1e293b}
    .wa-num{color:#16a34a;font-size:0.82rem;font-weight:500}
    .platform-badge{padding:3px 9px;border-radius:6px;font-size:0.75rem;font-weight:700}
    .p-yt{background:#fef2f2;color:#dc2626}
    .p-ig{background:#fdf4ff;color:#9333ea}
    .p-fb{background:#eff6ff;color:#1d4ed8}
    .plan-text{font-size:0.82rem;color:#475569}
    .amount{font-weight:700;color:#f97316;font-size:0.95rem}
    .ad-budget{font-size:0.75rem;color:#94a3b8;margin-top:1px}

    /* STATUS SELECT */
    .status-select{padding:6px 10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:0.8rem;font-weight:600;cursor:pointer;outline:none;font-family:inherit;background:#fff;transition:border-color 0.15s}
    .status-select:focus{border-color:#f97316}
    .status-select.s-pending{border-color:#fcd34d;color:#92400e;background:#fffbeb}
    .status-select.s-launched{border-color:#93c5fd;color:#1d4ed8;background:#eff6ff}
    .status-select.s-completed{border-color:#86efac;color:#166534;background:#f0fdf4}

    /* BUTTONS */
    .btn-wa{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;background:#22c55e;color:#fff;border:none;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;transition:background 0.15s}
    .btn-wa:hover{background:#16a34a}
    .track-cell{display:flex;align-items:center;gap:5px}
    .track-no{font-size:1rem;font-weight:800;color:#f97316;letter-spacing:0.08em;min-width:52px;cursor:pointer;border-bottom:1.5px dashed #fcd34d}
    .track-no:hover{color:#ea580c}
    .track-input-inline{width:70px;padding:4px 7px;border:1.5px solid #f97316;border-radius:6px;font-size:0.95rem;font-weight:700;font-family:inherit;color:#f97316;outline:none;text-align:center;letter-spacing:0.08em}
    .btn-save-track{padding:4px 9px;background:#f97316;color:#fff;border:none;border-radius:6px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:inherit}
    .btn-save-track:hover{background:#ea580c}
    .btn-mail{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;transition:background 0.15s;margin-top:5px}
    .btn-mail:hover{background:#4f46e5}
    .action-col{display:flex;flex-direction:column;gap:0}
    .video-link{display:inline-block;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#6366f1;font-size:0.78rem;font-weight:600;text-decoration:none;vertical-align:middle}
    .video-link:hover{text-decoration:underline}
    .no-link{color:#cbd5e1;font-size:0.78rem}
    .service-tag{display:inline-block;background:#f1f5f9;color:#475569;padding:2px 7px;border-radius:5px;font-size:0.73rem;font-weight:600;margin-top:3px}

    /* EMPTY */
    .empty-state{text-align:center;padding:60px 24px;color:#94a3b8}
    .empty-state .icon{font-size:3rem;margin-bottom:12px}
    .empty-state p{font-size:0.95rem}

    /* LOADING */
    .loading-state{text-align:center;padding:48px;color:#94a3b8;font-weight:500}

    /* Complete Modal */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;align-items:center;justify-content:center;padding:20px}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:28px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
    .modal h3{font-size:1.05rem;margin-bottom:8px}
    .modal p{color:#64748b;font-size:0.85rem;margin-bottom:14px}
    .modal input{width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:1rem;margin-bottom:14px;outline:none;font-family:inherit}
    .modal input:focus{border-color:#f97316}
    .modal-btns{display:flex;gap:8px}
    .modal-btns button{flex:1;padding:10px;border-radius:9px;font-weight:700;cursor:pointer;border:none;font-family:inherit;font-size:0.9rem}
    .btn-cancel{background:#f1f5f9;color:#64748b}
    .btn-confirm{background:linear-gradient(135deg,#f97316,#ec4899);color:#fff}

    @media(max-width:768px){
      .stats{gap:12px}
      .table-wrap{padding:12px}
      th,td{padding:10px 10px}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">⚡ BoostKaro</div>
    <div class="login-sub">Admin Panel</div>
    <input type="password" id="pwInput" placeholder="Password daalo" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-login" onclick="doLogin()">Login →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="header">
    <div class="logo">⚡ BoostKaro Admin</div>
    <div class="header-right">
      <div class="stats">
        <div class="stat"><strong id="sTot">0</strong><span>Total</span></div>
        <div class="stat"><strong id="sPend">0</strong><span>Pending</span></div>
        <div class="stat"><strong id="sLive">0</strong><span>Live</span></div>
        <div class="stat"><strong id="sRev">₹0</strong><span>Revenue</span></div>
      </div>
      <button class="btn-refresh" onclick="loadOrders()">↻ Refresh</button>
    </div>
  </div>

  <div class="tabs-wrap">
    <div class="tab active" onclick="setTab('pending',this)">⏳ Pending <span class="badge" id="bPend">0</span></div>
    <div class="tab" onclick="setTab('launched',this)">🚀 In Progress <span class="badge" id="bLive">0</span></div>
    <div class="tab" onclick="setTab('completed',this)">✅ Completed <span class="badge" id="bDone">0</span></div>
    <div class="tab" onclick="setTab('all',this)">📋 Sab <span class="badge" id="bAll">0</span></div>
  </div>

  <div class="table-wrap">
    <div id="tableArea"><div class="loading-state">↻ Load ho raha hai...</div></div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3>✅ Campaign Complete Karo</h3>
    <p>Post-campaign views daalo (optional)</p>
    <input type="number" id="postViews" placeholder="Jaise: 5000"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmComplete()">Complete Karo</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxeB6DMx4aEQzBwHrTVLavowHYLarTIXoOLJxI9aVr5cnXyj3W0qWlRRk7QJJtQ4p8K/exec';
const PASS = 'boostkaro2026';
let allOrders = [];
let currentTab = 'pending';
let completingId = null;

function doLogin() {
  if (document.getElementById('pwInput').value === PASS) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadOrders();
  } else { alert('Galat password!'); }
}

async function loadOrders() {
  document.getElementById('tableArea').innerHTML = '<div class="loading-state">↻ Load ho raha hai...</div>';
  try {
    const res = await fetch(GAS_URL + '?action=getOrders', { redirect: 'follow' });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    allOrders = (data.orders || []).filter(o => o.orderId);
    updateBadges();
    renderTable();
  } catch(e) {
    document.getElementById('tableArea').innerHTML = '<div class="loading-state">⚠️ Error: ' + e.message + '</div>';
  }
}

function updateBadges() {
  const pend = allOrders.filter(o => !['Launched','Completed'].includes(o.campaignStatus)).length;
  const live = allOrders.filter(o => o.campaignStatus === 'Launched').length;
  const done = allOrders.filter(o => o.campaignStatus === 'Completed').length;
  document.getElementById('bPend').textContent = pend;
  document.getElementById('bLive').textContent = live;
  document.getElementById('bDone').textContent = done;
  document.getElementById('bAll').textContent = allOrders.length;
  document.getElementById('sTot').textContent = allOrders.length;
  document.getElementById('sPend').textContent = pend;
  document.getElementById('sLive').textContent = live;
  document.getElementById('sRev').textContent = '₹' + allOrders.reduce((s,o)=>s+Number(o.amount||0),0).toLocaleString('en-IN');
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function getFiltered() {
  if (currentTab === 'pending')   return allOrders.filter(o => !['Launched','Completed'].includes(o.campaignStatus));
  if (currentTab === 'launched')  return allOrders.filter(o => o.campaignStatus === 'Launched');
  if (currentTab === 'completed') return allOrders.filter(o => o.campaignStatus === 'Completed');
  return allOrders;
}

function renderTable() {
  const rows = getFiltered();
  if (!rows.length) {
    document.getElementById('tableArea').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Koi order nahi</p></div>';
    return;
  }
  const pMap = {youtube:'p-yt',instagram:'p-ig',facebook:'p-fb'};
  const pName = {youtube:'YouTube',instagram:'Instagram',facebook:'Facebook'};
  const html = `
  <table>
    <thead>
      <tr>
        <th>Track #</th>
        <th>Order ID</th>
        <th>Customer</th>
        <th>Platform</th>
        <th>Video Link</th>
        <th>Plan / Budget</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map((o,i) => {
        const phone = String(o.phone||'').replace(/\D/g,'');
        const statusLabel = o.campaignStatus === 'Launched' ? '🚀 Campaign LIVE hai!' : o.campaignStatus === 'Completed' ? '✅ Campaign Complete ho gaya!' : '⏳ Campaign jald shuru hoga';
        const waMsg = encodeURIComponent('Namaskar ' + (o.name||'') + '! Aapka BoostKaro Order update:\n\n📦 Track No: ' + (o.trackingNo||o.orderId) + '\n📊 Status: ' + statusLabel + '\n\nStatus check karo: https://boostkaro.dataimpact.in/status.html?track=' + (o.trackingNo||'') + '\n\nKoi sawaal ho to batayein. 🙏');
        const waLink = 'https://wa.me/' + (phone.startsWith('91') ? phone : '91'+phone) + '?text=' + waMsg;
        const sc = o.campaignStatus === 'Launched' ? 's-launched' : o.campaignStatus === 'Completed' ? 's-completed' : 's-pending';
        const videoLink = o.userLink || o.link || '';
        const linkDisplay = videoLink ? videoLink.replace(/https?:\/\/(www\.)?/,'').slice(0,30) + (videoLink.length > 35 ? '…' : '') : '';
        const service = o.service || o.objective || '';
        const mailSubject = encodeURIComponent('BoostKaro — Order #' + o.orderId + ' Update');
        const mailBody = encodeURIComponent('Namaskar ' + (o.name||'') + ',\n\nAapka order update hai.\n\nOrder ID: ' + o.orderId + '\n\nBoostKaro Team');
        const hasEmail = o.email && o.email !== '-' && String(o.email).includes('@');
        return `<tr>
          <td>
            <div class="track-cell" id="tc-${o.orderId}">
              <span class="track-no" title="Click to edit" onclick="editTracking('${o.orderId}','${o.trackingNo||''}')">${o.trackingNo||'——'}</span>
            </div>
          </td>
          <td><span class="order-id">${o.orderId}</span></td>
          <td>
            <div class="cust-name">${o.name || '—'}</div>
            <div style="font-size:0.75rem;color:#94a3b8;margin-top:2px">📱 ${o.phone || '—'}</div>
          </td>
          <td><span class="platform-badge ${pMap[o.platform]||'p-yt'}">${pName[o.platform]||o.platform}</span></td>
          <td>
            ${videoLink
              ? `<a href="${videoLink}" target="_blank" class="video-link" title="${videoLink}">🔗 ${linkDisplay}</a>`
              : `<span class="no-link">—</span>`}
            ${service ? `<div><span class="service-tag">${service}</span></div>` : ''}
          </td>
          <td>
            <div class="amount">₹${Number(o.amount||0).toLocaleString('en-IN')} <span style="font-size:0.7rem;color:#94a3b8">paid</span></div>
            <div class="ad-budget">Ad: ₹${Number(o.adBudget||0).toLocaleString('en-IN')} · ${o.plan||''}</div>
          </td>
          <td>
            <select class="status-select ${sc}" onchange="onStatusChange('${o.orderId}', this)">
              <option ${o.campaignStatus==='Not Started'?'selected':''}>Not Started</option>
              <option ${o.campaignStatus==='Launched'?'selected':''}>Launched</option>
              <option ${o.campaignStatus==='Completed'?'selected':''}>Completed</option>
              <option ${o.campaignStatus==='Campaign Error'?'selected':''}>Campaign Error</option>
            </select>
          </td>
          <td>
            ${hasEmail ? `<a href="mailto:${o.email}?subject=${mailSubject}&body=${mailBody}" class="btn-mail">✉️ Mail</a>` : '<span style="color:#cbd5e1;font-size:0.78rem">No email</span>'}
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
  document.getElementById('tableArea').innerHTML = html;
}

function onStatusChange(orderId, sel) {
  const status = sel.value;
  sel.className = 'status-select ' + (status==='Launched'?'s-launched':status==='Completed'?'s-completed':'s-pending');
  if (status === 'Completed') {
    completingId = orderId;
    document.getElementById('postViews').value = '';
    document.getElementById('modal').classList.add('open');
  } else {
    updateStatus(orderId, status);
  }
}

async function updateStatus(orderId, status, postViews) {
  try {
    const payload = { orderId, status };
    if (postViews) payload.postViews = postViews;
    const res = await fetch(GAS_URL + '?action=updateStatus', {
      method: 'POST', headers: {'Content-Type':'text/plain'},
      body: JSON.stringify(payload), redirect: 'follow'
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    await loadOrders();
  } catch(e) { alert('Error: ' + e.message); loadOrders(); }
}

function editTracking(orderId, current) {
  const cell = document.getElementById('tc-' + orderId);
  if (!cell) return;
  cell.innerHTML = `
    <input class="track-input-inline" id="ti-${orderId}" value="${current}" maxlength="6" inputmode="numeric"
      onkeydown="if(event.key==='Enter')saveTracking('${orderId}')" />
    <button class="btn-save-track" onclick="saveTracking('${orderId}')">✓</button>`;
  document.getElementById('ti-' + orderId).focus();
}

async function saveTracking(orderId) {
  const input = document.getElementById('ti-' + orderId);
  if (!input) return;
  const val = input.value.trim();
  if (!val) { alert('Track number daalo'); return; }
  try {
    const res = await fetch(GAS_URL + '?action=updateTracking', {
      method: 'POST', headers: {'Content-Type':'text/plain'},
      body: JSON.stringify({ orderId, trackingNo: val }), redirect: 'follow'
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    // Update in allOrders locally
    const o = allOrders.find(x => x.orderId === orderId);
    if (o) o.trackingNo = val;
    const cell = document.getElementById('tc-' + orderId);
    if (cell) cell.innerHTML = `<span class="track-no" title="Click to edit" onclick="editTracking('${orderId}','${val}')">${val}</span>`;
  } catch(e) { alert('Error: ' + e.message); }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  completingId = null;
  loadOrders();
}
async function confirmComplete() {
  const v = document.getElementById('postViews').value;
  document.getElementById('modal').classList.remove('open');
  await updateStatus(completingId, 'Completed', v || null);
  completingId = null;
}
</script>
</body>
</html>
