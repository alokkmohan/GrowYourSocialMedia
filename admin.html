<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>BoostKaro Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f8fafc;min-height:100vh;color:#1a0a00}

    /* LOGIN */
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
    .login-box{background:#fff;border-radius:20px;padding:36px 28px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.08);text-align:center}
    .login-box h1{font-size:1.6rem;margin-bottom:6px}
    .login-box p{color:#a8784a;margin-bottom:24px}
    .login-box input{width:100%;padding:13px 14px;border:1.5px solid #ffe8d6;border-radius:10px;font-size:1rem;margin-bottom:12px;outline:none}
    .login-box input:focus{border-color:#f97316}
    .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#f97316,#ec4899);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}

    /* HEADER */
    .header{background:#fff;border-bottom:1.5px solid #ffe8d6;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .header .logo{font-size:1.2rem;font-weight:800;color:#f97316}
    .header-stats{display:flex;gap:16px}
    .hstat{text-align:center}
    .hstat strong{display:block;font-size:1.1rem;font-weight:800;color:#1a0a00}
    .hstat span{font-size:0.72rem;color:#a8784a}
    .btn-refresh{background:#fff9f5;border:1.5px solid #f97316;color:#f97316;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.85rem}

    /* FILTERS */
    .filters{padding:14px 20px;display:flex;gap:8px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #ffe8d6}
    .filter-btn{padding:7px 14px;border-radius:999px;border:1.5px solid #ffe8d6;background:#fff;font-size:0.82rem;font-weight:600;cursor:pointer;color:#a8784a;transition:all 0.15s}
    .filter-btn.active{background:linear-gradient(135deg,#f97316,#ec4899);color:#fff;border-color:transparent}

    /* ORDERS */
    .orders{padding:16px 20px;display:grid;gap:12px;max-width:680px;margin:0 auto}

    /* CARD */
    .card{background:#fff;border-radius:16px;border:1.5px solid #ffe8d6;overflow:hidden;transition:box-shadow 0.15s}
    .card:hover{box-shadow:0 4px 20px rgba(249,115,22,0.1)}
    .card.complete{border-color:#e2e8f0;opacity:0.75}
    .card-top{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .card-name{font-weight:700;font-size:1rem;color:#1a0a00}
    .card-phone{font-size:0.85rem;color:#a8784a;margin-top:2px}
    .card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .tag{padding:3px 9px;border-radius:999px;font-size:0.75rem;font-weight:700}
    .tag-yt{background:#fef2f2;color:#dc2626}
    .tag-ig{background:#fdf4ff;color:#9333ea}
    .tag-fb{background:#eff6ff;color:#1d4ed8}
    .tag-amt{background:#fff9f5;color:#f97316;border:1px solid #ffe8d6}
    .tag-plan{background:#f0fdf4;color:#166534}

    .status-badge{padding:5px 11px;border-radius:999px;font-size:0.78rem;font-weight:700;white-space:nowrap;flex-shrink:0}
    .s-pending{background:#fef3c7;color:#92400e}
    .s-launched{background:#dbeafe;color:#1d4ed8}
    .s-completed{background:#dcfce7;color:#166534}
    .s-error{background:#fef2f2;color:#dc2626}

    .card-actions{padding:10px 16px 14px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid #fff9f5}

    .btn{padding:9px 14px;border-radius:9px;font-size:0.82rem;font-weight:700;cursor:pointer;border:none;transition:all 0.15s}
    .btn-wa{background:#22c55e;color:#fff}
    .btn-wa:hover{background:#16a34a}
    .btn-launch{background:#3b82f6;color:#fff}
    .btn-launch:hover{background:#2563eb}
    .btn-complete{background:#f97316;color:#fff}
    .btn-complete:hover{background:#ea580c}
    .btn-mail{background:#8b5cf6;color:#fff}
    .btn-mail:hover{background:#7c3aed}
    .btn:disabled{opacity:0.4;cursor:not-allowed}

    /* Empty */
    .empty{text-align:center;padding:48px 24px;color:#a8784a}
    .empty .big{font-size:2.5rem;margin-bottom:8px}

    /* Loading */
    .loading{text-align:center;padding:48px;color:#a8784a;font-weight:600}

    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:24px;max-width:360px;width:100%}
    .modal h3{margin-bottom:12px;font-size:1.1rem}
    .modal input{width:100%;padding:11px 13px;border:1.5px solid #ffe8d6;border-radius:9px;font-size:1rem;margin-bottom:12px;outline:none}
    .modal-btns{display:flex;gap:8px}
    .modal-btns button{flex:1;padding:10px;border-radius:9px;font-weight:700;cursor:pointer;border:none}
    .btn-cancel-modal{background:#f1f5f9;color:#64748b}
    .btn-confirm-modal{background:#f97316;color:#fff}

    @media(max-width:500px){
      .header-stats{gap:10px}
      .hstat strong{font-size:0.95rem}
      .orders{padding:12px}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div style="font-size:2rem;margin-bottom:8px">⚡</div>
    <h1>BoostKaro Admin</h1>
    <p>Password enter karo</p>
    <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-login" onclick="doLogin()">Login →</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">
  <div class="header">
    <div class="logo">⚡ BoostKaro</div>
    <div class="header-stats">
      <div class="hstat"><strong id="statTotal">0</strong><span>Total</span></div>
      <div class="hstat"><strong id="statPending">0</strong><span>Pending</span></div>
      <div class="hstat"><strong id="statRevenue">₹0</strong><span>Revenue</span></div>
    </div>
    <button class="btn-refresh" onclick="loadOrders()">↻ Refresh</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Sab</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">⏳ Pending</button>
    <button class="filter-btn" onclick="setFilter('launched',this)">🚀 Live</button>
    <button class="filter-btn" onclick="setFilter('completed',this)">✅ Complete</button>
  </div>

  <div class="orders" id="ordersList">
    <div class="loading">Orders load ho rahe hain...</div>
  </div>
</div>

<!-- Complete Modal -->
<div class="modal-overlay" id="completeModal">
  <div class="modal">
    <h3>📊 Campaign Complete Karo</h3>
    <p style="color:#a8784a;font-size:0.88rem;margin-bottom:12px">Post-campaign views daalo (optional)</p>
    <input type="number" id="postViewsInput" placeholder="Jaise: 5000"/>
    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm-modal" onclick="confirmComplete()">Complete ✅</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyiYBwBoZr9zEPzzeUF-8tQnunKH_jlH4xIlCLzh9sLiisHCRDZ7Sn0o2Qo4_q3_wo/exec';
const PASS = 'boostkaro2026';

let allOrders = [];
let currentFilter = 'all';
let completingOrderId = null;

function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASS) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadOrders();
  } else {
    alert('Galat password!');
  }
}

async function loadOrders() {
  document.getElementById('ordersList').innerHTML = '<div class="loading">↻ Load ho raha hai...</div>';
  try {
    const res = await fetch(GAS_URL + '?action=getOrders', { redirect: 'follow' });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    allOrders = data.orders || [];
    renderOrders();
    updateStats();
  } catch(e) {
    document.getElementById('ordersList').innerHTML = '<div class="empty"><div class="big">⚠️</div>Load nahi hua: ' + e.message + '</div>';
  }
}

function updateStats() {
  const paid = allOrders.filter(o => o.paymentStatus === 'Paid');
  const pending = paid.filter(o => o.campaignStatus !== 'Completed');
  const revenue = paid.reduce((s,o) => s + Number(o.amount||0), 0);
  document.getElementById('statTotal').textContent = paid.length;
  document.getElementById('statPending').textContent = pending.length;
  document.getElementById('statRevenue').textContent = '₹' + revenue.toLocaleString('en-IN');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const paid = allOrders.filter(o => o.orderId);
  let filtered = paid;
  if (currentFilter === 'pending') filtered = paid.filter(o => !['Launched','Completed'].includes(o.campaignStatus));
  if (currentFilter === 'launched') filtered = paid.filter(o => o.campaignStatus === 'Launched');
  if (currentFilter === 'completed') filtered = paid.filter(o => o.campaignStatus === 'Completed');

  // Incomplete first, complete last
  filtered.sort((a,b) => {
    const aComplete = a.campaignStatus === 'Completed' ? 1 : 0;
    const bComplete = b.campaignStatus === 'Completed' ? 1 : 0;
    if (aComplete !== bComplete) return aComplete - bComplete;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });

  if (!filtered.length) {
    document.getElementById('ordersList').innerHTML = '<div class="empty"><div class="big">📭</div>Koi order nahi</div>';
    return;
  }
  document.getElementById('ordersList').innerHTML = filtered.map(cardHtml).join('');
}

function cardHtml(o) {
  const isComplete = o.campaignStatus === 'Completed';
  const platformTag = { youtube:'tag-yt', instagram:'tag-ig', facebook:'tag-fb' }[o.platform] || 'tag-yt';
  const platformName = { youtube:'YouTube', instagram:'Instagram', facebook:'Facebook' }[o.platform] || o.platform;
  const statusClass = { 'Not Started':'s-pending','Launched':'s-launched','Completed':'s-completed','Campaign Error':'s-error' }[o.campaignStatus] || 's-pending';
  const statusLabel = { 'Not Started':'⏳ Pending','Launched':'🚀 Live','Completed':'✅ Done','Campaign Error':'❌ Error' }[o.campaignStatus] || o.campaignStatus;
  const date = o.createdAt ? new Date(o.createdAt).toLocaleDateString('en-IN') : '';

  const waMsg = encodeURIComponent('Namaskar ' + (o.name||'') + '! Aapka BoostKaro Order #' + o.orderId + ' confirm ho gaya. Campaign jald shuru hoga. 🚀 — BoostKaro');
  const phone = String(o.phone||'').replace(/\D/g,'');
  const waLink = 'https://wa.me/' + phone + '?text=' + waMsg;

  const launchBtn = (!isComplete && o.campaignStatus !== 'Launched')
    ? '<button class="btn btn-launch" onclick="updateStatus(\'' + o.orderId + '\',\'Launched\')">🚀 Launch</button>' : '';
  const completeBtn = (o.campaignStatus === 'Launched')
    ? '<button class="btn btn-complete" onclick="openComplete(\'' + o.orderId + '\')">✅ Complete</button>' : '';
  const mailBtn = o.email
    ? '<button class="btn btn-mail" onclick="sendMail(\'' + o.email + '\',\'' + o.orderId + '\')">📧 Mail</button>' : '';

  return `
    <div class="card ${isComplete?'complete':''}">
      <div class="card-top">
        <div>
          <div class="card-name">${o.name || 'Unknown'}</div>
          <div class="card-phone">📱 ${o.phone || '-'} ${date ? '· '+date : ''}</div>
          <div class="card-meta">
            <span class="tag ${platformTag}">${platformName}</span>
            <span class="tag tag-plan">${o.plan || o.service || '-'}</span>
            <span class="tag tag-amt">₹${Number(o.amount||0).toLocaleString('en-IN')}</span>
          </div>
        </div>
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <div class="card-actions">
        <a href="${waLink}" target="_blank" class="btn btn-wa">📱 WhatsApp</a>
        ${launchBtn}
        ${completeBtn}
        ${mailBtn}
      </div>
    </div>`;
}

async function updateStatus(orderId, status, postViews) {
  try {
    const payload = { orderId, status };
    if (postViews) payload.postViews = postViews;
    const res = await fetch(GAS_URL + '?action=updateStatus', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
      redirect: 'follow'
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    await loadOrders();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function openComplete(orderId) {
  completingOrderId = orderId;
  document.getElementById('postViewsInput').value = '';
  document.getElementById('completeModal').classList.add('open');
}
function closeModal() {
  document.getElementById('completeModal').classList.remove('open');
  completingOrderId = null;
}
async function confirmComplete() {
  const postViews = document.getElementById('postViewsInput').value;
  closeModal();
  await updateStatus(completingOrderId, 'Completed', postViews || null);
}

function sendMail(email, orderId) {
  window.open('mailto:' + email + '?subject=BoostKaro Order Update ' + orderId, '_blank');
}
</script>
</body>
</html>
